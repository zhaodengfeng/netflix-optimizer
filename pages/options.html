<!DOCTYPE html>
<html>
    <head>
        <title>Netflix Optimizer - Options</title>
        <link rel="stylesheet" href="picnic.min.css">
        <style>
            html {
                height: auto;
            }
            body {
                margin: 20px;
                overflow: hidden;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                background: #141414;
                color: #fff;
            }
            h2 {
                color: #e50914;
                margin-bottom: 16px;
                font-size: 18px;
            }
            .checkable {
                color: #ccc;
            }
            label:hover .checkable {
                color: #fff;
            }
            #save {
                background: #e50914;
                border: none;
                color: #fff;
                padding: 8px 20px;
                border-radius: 4px;
                cursor: pointer;
                font-size: 14px;
                margin-top: 8px;
            }
            #save:hover {
                background: #f40612;
            }
            #options-saved {
                color: #46d369;
                margin-left: 10px;
                font-size: 14px;
            }
            .full {
                margin-bottom: 10px;
            }
        </style>
    </head>
    <body>
        <h2>Netflix Optimizer Settings</h2>
        <div class="flex">
            <div class="full">
                <label>
                    <input type="checkbox" id="use-51" />
                    <span class="checkable">Use 5.1 audio when available</span>
                </label>
            </div>
            <div class="full">
                <label>
                    <input type="checkbox" id="set-max-bitrate" />
                    <span class="checkable">Automatically select best bitrate available</span>
                </label>
            </div>
            <div class="full">
                <label>
                    <input type="checkbox" id="disable-vp9" />
                    <span class="checkable">Disable VP9 codec</span>
                </label>
            </div>
            <div class="full">
                <label>
                    <input type="checkbox" id="disable-avchigh" />
                    <span class="checkable">Disable AVChigh codec</span>
                </label>
            </div>
            <div class="full">
                <label>
                    <input type="checkbox" id="disable-av1" />
                    <span class="checkable">Disable AV1 codec</span>
                </label>
            </div>
            <div class="full">
                <label>
                    <input type="checkbox" id="show-all-subs" />
                    <span class="checkable">Show all subtitle tracks</span>
                </label>
            </div>
            <div class="full">
                <button id="save">Save</button>
                <span id="options-saved" style="display: none">✓ Options saved!</span>
            </div>
        </div>

        <script src="options.js"></script>
    </body>
</html>
